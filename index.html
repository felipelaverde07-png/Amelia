<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Para Amelia ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --negro:#07070b;
    --azul-oscuro:#0b1826;
    --dorado:#d4af37;
    --dorado-claro:#f1d98a;
    --vino:#5e1f2b;
    --blanco-antiguo:#f3ecd9;
    --marfil:#fffbf0;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}

  html,body{
    margin:0; padding:0; height:100%; width:100%;
    background:var(--negro);
    color:var(--blanco-antiguo);
    font-family:'EB Garamond', serif;
    overflow:hidden;
    -webkit-user-select:none; user-select:none;
  }

  #app{
    position:relative;
    width:100vw; height:100vh; height:100dvh;
    overflow:hidden;
  }

  /* ===================== FONDO VIVO ===================== */
  #fondo{
    position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(ellipse at 50% 20%, rgba(13,27,42,0.9) 0%, rgba(7,7,11,1) 65%),
      linear-gradient(180deg,#050508 0%, #0b1826 55%, #05050a 100%);
  }
  #estrellas, #niebla, #particulas{
    position:fixed; inset:0; pointer-events:none;
  }
  #estrellas{ z-index:1; }
  .estrella{
    position:absolute; border-radius:50%;
    background:var(--marfil);
    box-shadow:0 0 6px 1px rgba(255,251,240,0.6);
    animation:titilar linear infinite;
  }
  @keyframes titilar{
    0%,100%{opacity:.15; transform:scale(.8);}
    50%{opacity:1; transform:scale(1.15);}
  }

  #niebla{ z-index:2; overflow:hidden; }
  .capa-niebla{
    position:absolute; bottom:-10%; left:-20%;
    width:140%; height:45%;
    background:radial-gradient(ellipse at center, rgba(212,175,55,0.05) 0%, rgba(212,175,55,0) 70%);
    filter:blur(20px);
    animation:derivar 40s ease-in-out infinite;
  }
  .capa-niebla.b{ animation-duration:55s; animation-direction:reverse; bottom:-20%; opacity:.6; }
  @keyframes derivar{
    0%{ transform:translateX(-5%);}
    50%{ transform:translateX(5%);}
    100%{ transform:translateX(-5%);}
  }

  #particulas{ z-index:3; }
  .particula{
    position:absolute; top:-40px;
    font-size:18px;
    filter:drop-shadow(0 0 4px rgba(212,175,55,0.35));
    animation-name:caer, balancear;
    animation-timing-function:linear, ease-in-out;
    animation-iteration-count:1, infinite;
    will-change:transform, opacity;
  }
  @keyframes caer{
    0%{ transform:translateY(-5vh); opacity:0; }
    8%{ opacity:.95; }
    92%{ opacity:.85; }
    100%{ transform:translateY(105vh); opacity:0; }
  }
  @keyframes balancear{
    0%,100%{ margin-left:0px; }
    50%{ margin-left:40px; }
  }

  /* ===================== PANTALLAS ===================== */
  .pantalla{
    position:absolute; inset:0; z-index:5;
    display:none;
    align-items:center; justify-content:center;
    flex-direction:column;
    padding:6vh 6vw;
    text-align:center;
    opacity:0;
    transition:opacity 1.1s ease;
  }
  .pantalla.activa{ display:flex; opacity:1; }
  .pantalla.saliendo{ opacity:0; }

  .dorado-txt{ color:var(--dorado-claro); }
  .titulo-elegante{
    font-family:'Cinzel Decorative', serif;
    letter-spacing:.06em;
    color:var(--dorado-claro);
    text-shadow:0 0 18px rgba(212,175,55,0.35);
  }
  .subtitulo{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    color:var(--blanco-antiguo);
    opacity:.85;
  }

  /* ===================== SOBRE ===================== */
  #pantalla-sobre .para-quien{
    font-family:'Cinzel', serif;
    font-size:clamp(14px,2.4vw,18px);
    letter-spacing:.25em;
    text-transform:uppercase;
    color:var(--dorado);
    opacity:.8;
    margin-bottom:2px;
  }
  #pantalla-sobre .nombre-destino{
    font-family:'Great Vibes', cursive;
    font-size:clamp(34px,7vw,58px);
    color:var(--marfil);
    margin:0 0 5vh 0;
    text-shadow:0 0 20px rgba(243,236,217,0.25);
  }

  .escena-sobre{
    position:relative;
    width:min(320px, 78vw);
    aspect-ratio:3/2;
    cursor:pointer;
    perspective:1200px;
    animation:respirar 3.6s ease-in-out infinite;
  }
  @keyframes respirar{
    0%,100%{ transform:translateY(0) scale(1); }
    50%{ transform:translateY(-6px) scale(1.015); }
  }
  .escena-sobre.abriendo{ animation:none; }

  .sobre-cuerpo{
    position:absolute; inset:0;
    background:linear-gradient(160deg,#e8dcb8,#d8c495 55%,#c9b57e);
    border-radius:4px;
    box-shadow:0 20px 45px rgba(0,0,0,0.55), inset 0 0 30px rgba(94,31,43,0.08);
  }
  .sobre-solapa{
    position:absolute; top:0; left:0; right:0; height:62%;
    background:linear-gradient(160deg,#efe4c2,#dbc794 60%,#c9b57e);
    clip-path:polygon(0 0, 100% 0, 50% 78%);
    transform-origin:top center;
    transform-style:preserve-3d;
    transition:transform 1.4s cubic-bezier(.6,.05,.2,1);
    box-shadow:0 6px 18px rgba(0,0,0,0.25);
    z-index:4;
  }
  .escena-sobre.abriendo .sobre-solapa{
    transform:rotateX(180deg);
  }
  .sobre-lineas{
    position:absolute; inset:10% 8%; z-index:1;
    display:flex; flex-direction:column; justify-content:flex-end; gap:6px;
    opacity:.55;
  }
  .sobre-lineas div{ height:1px; background:var(--vino); }
  .sobre-lineas div:nth-child(1){ width:70%; }
  .sobre-lineas div:nth-child(2){ width:40%; }

  .sello-cera{
    position:absolute; top:50%; left:50%;
    width:56px; height:56px; border-radius:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle at 35% 30%, #8f2c3a, var(--vino) 60%, #3f0f18 100%);
    box-shadow:0 4px 10px rgba(0,0,0,.5), inset 0 0 8px rgba(0,0,0,.4);
    display:flex; align-items:center; justify-content:center;
    font-size:22px;
    z-index:6;
    transition:transform .6s ease, opacity .6s ease;
  }
  .escena-sobre.abriendo .sello-cera{
    transform:translate(-50%,-50%) scale(1.3) rotate(25deg);
    opacity:0;
  }

  .carta-asomando{
    position:absolute; left:8%; right:8%; bottom:6%;
    top:14%;
    background:linear-gradient(180deg,var(--marfil),var(--blanco-antiguo));
    border-radius:2px;
    box-shadow:0 -4px 14px rgba(0,0,0,.25);
    transform:translateY(0) scaleY(0.05);
    transform-origin:bottom center;
    transition:transform 1.1s cubic-bezier(.2,.8,.2,1) .9s;
    z-index:3;
  }
  .escena-sobre.abriendo .carta-asomando{
    transform:translateY(-46%) scaleY(1);
  }

  .instruccion-sobre{
    margin-top:5vh;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:clamp(14px,2.6vw,19px);
    color:var(--dorado-claro);
    opacity:.85;
    animation:parpadeoSuave 2.4s ease-in-out infinite;
  }
  @keyframes parpadeoSuave{
    0%,100%{ opacity:.5; } 50%{ opacity:1; }
  }

  /* ===================== CARTA ===================== */
  #pantalla-carta{ justify-content:flex-start; padding-top:4vh; }
  .hoja-carta{
    position:relative;
    width:min(640px,92vw);
    max-height:82vh;
    overflow-y:auto;
    padding:6vh 6vw 5vh;
    background:
      radial-gradient(ellipse at top left, rgba(94,31,43,0.05), transparent 55%),
      linear-gradient(180deg,#fbf6e6,#f1e6c8 92%,#e8d8ac);
    border-radius:2px;
    box-shadow:0 30px 70px rgba(0,0,0,.6), 0 0 0 1px rgba(94,31,43,0.08) inset;
    color:#2c1810;
  }
  .hoja-carta::before{
    content:''; position:absolute; inset:0; pointer-events:none; border-radius:2px;
    box-shadow:inset 0 0 60px 18px rgba(120,72,25,0.28), inset 0 0 12px 4px rgba(60,20,10,0.25);
  }
  .hoja-carta::after{
    content:''; position:absolute; inset:0; pointer-events:none;
    background:
      radial-gradient(circle at 4% 6%, rgba(94,31,43,0.18), transparent 12%),
      radial-gradient(circle at 96% 92%, rgba(94,31,43,0.18), transparent 12%);
  }
  .texto-carta{
    font-family:'Great Vibes', cursive;
    font-size:clamp(22px,3.4vw,30px);
    line-height:1.55;
    text-align:left;
    min-height:40vh;
    white-space:pre-wrap;
  }
  .cursor-escritura{
    display:inline-block;
    width:2px; margin-left:2px;
    background:var(--vino);
    animation:parpadeoCursor .8s steps(1) infinite;
  }
  @keyframes parpadeoCursor{ 50%{ opacity:0; } }

  /* ===================== ACTA ===================== */
  .hoja-acta{
    width:min(560px,90vw);
    padding:5vh 6vw;
    background:linear-gradient(180deg,#fbf6e6,#f1e6c8);
    color:#241109;
    border-radius:2px;
    box-shadow:0 30px 70px rgba(0,0,0,.6), 0 0 0 2px var(--dorado) inset, 0 0 0 6px rgba(94,31,43,0.15) inset;
    position:relative;
  }
  .hoja-acta h2{
    font-family:'Cinzel Decorative', serif;
    color:var(--vino);
    letter-spacing:.05em;
    font-size:clamp(18px,3.6vw,26px);
    margin:0 0 3vh;
  }
  .campo-acta{
    text-align:left;
    font-family:'Cormorant Garamond', serif;
    font-size:clamp(15px,2.6vw,19px);
    margin-bottom:1.6vh;
    border-bottom:1px dashed rgba(94,31,43,0.35);
    padding-bottom:1vh;
  }
  .campo-acta b{ color:var(--vino); font-family:'Cinzel', serif; font-size:0.75em; letter-spacing:.08em; display:block; text-transform:uppercase; opacity:.75; }
  #estado-acta{ font-weight:600; }
  #estado-acta.pendiente{ color:#8a6d1c; }
  #estado-acta.aprobado{ color:var(--vino); }

  .zona-firma{ margin-top:3vh; text-align:left; }
  .zona-firma label{
    display:block; font-family:'Cinzel',serif; font-size:.75em; letter-spacing:.08em;
    text-transform:uppercase; color:var(--vino); opacity:.75; margin-bottom:.8vh;
  }
  #lienzo-firma{
    width:100%; height:130px;
    background:rgba(255,255,255,0.35);
    border:1px dashed rgba(94,31,43,0.5);
    border-radius:4px;
    touch-action:none;
    cursor:crosshair;
  }
  .acciones-firma{ display:flex; gap:10px; margin-top:1.5vh; justify-content:flex-end; }

  .sello-aprobado{
    position:absolute; top:38%; left:50%;
    transform:translate(-50%,-50%) rotate(-18deg) scale(0);
    font-family:'Cinzel Decorative', serif;
    font-size:clamp(22px,5vw,34px);
    color:#8a1622;
    border:5px double #8a1622;
    padding:8px 20px;
    border-radius:8px;
    opacity:0;
    pointer-events:none;
  }
  .sello-aprobado.mostrar{
    animation:golpeSello .6s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  @keyframes golpeSello{
    0%{ transform:translate(-50%,-50%) rotate(-18deg) scale(3); opacity:0; }
    60%{ transform:translate(-50%,-50%) rotate(-14deg) scale(0.92); opacity:1; }
    100%{ transform:translate(-50%,-50%) rotate(-14deg) scale(1); opacity:.92; }
  }

  /* ===================== BOTONES ===================== */
  .boton-dorado{
    font-family:'Cinzel', serif;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:14px;
    padding:12px 30px;
    background:linear-gradient(180deg,var(--dorado-claro),var(--dorado));
    color:#241105;
    border:none; border-radius:30px;
    cursor:pointer;
    box-shadow:0 8px 22px rgba(212,175,55,0.35);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .boton-dorado:hover{ transform:translateY(-2px); box-shadow:0 12px 28px rgba(212,175,55,0.5); }
  .boton-dorado:disabled{ opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
  .boton-fantasma{
    font-family:'Cinzel', serif;
    letter-spacing:.06em;
    font-size:12px;
    padding:10px 20px;
    background:transparent;
    border:1px solid rgba(94,31,43,0.4);
    color:var(--vino);
    border-radius:30px;
    cursor:pointer;
  }

  /* ===================== PREGUNTA ===================== */
  #pantalla-pregunta{ position:absolute; }
  .pregunta-nombre{
    font-family:'Great Vibes', cursive;
    font-size:clamp(36px,7vw,60px);
    color:var(--dorado-claro);
    margin-bottom:1vh;
  }
  .pregunta-texto{
    font-family:'Cinzel', serif;
    font-size:clamp(18px,4vw,30px);
    color:var(--marfil);
    margin-bottom:6vh;
    letter-spacing:.02em;
  }
  .contenedor-botones-pregunta{
    position:relative;
    width:min(520px,90vw);
    height:140px;
  }
  #btn-si, #btn-no{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    padding:16px 34px;
    font-family:'Cinzel', serif;
    letter-spacing:.05em;
    font-size:clamp(14px,2.6vw,17px);
    border-radius:40px;
    cursor:pointer;
    border:none;
  }
  #btn-si{
    left:14%;
    background:linear-gradient(180deg,#f4d78e,var(--dorado));
    color:#2a1502;
    box-shadow:0 10px 26px rgba(212,175,55,0.45);
    animation:latido 1.8s ease-in-out infinite;
  }
  @keyframes latido{
    0%,100%{ transform:translateY(-50%) scale(1); }
    50%{ transform:translateY(-50%) scale(1.06); }
  }
  #btn-no{
    right:14%;
    background:transparent;
    border:1px solid rgba(243,236,217,0.5);
    color:var(--blanco-antiguo);
    transition:top .35s ease, left .35s ease, right .35s ease, transform .2s ease;
  }

  /* ===================== CELEBRACION / CERTIFICADO / FINAL ===================== */
  #capa-explosion{ position:fixed; inset:0; z-index:20; pointer-events:none; }
  .chispa{
    position:absolute; font-size:22px;
    animation:estallar 1.6s ease-out forwards;
  }
  @keyframes estallar{
    0%{ transform:translate(0,0) scale(0.3) rotate(0deg); opacity:1; }
    100%{ transform:var(--destino) scale(1.1) rotate(var(--giro)); opacity:0; }
  }

  #pantalla-final{ background:var(--negro); }
  #pantalla-final .texto-final{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:clamp(20px,4vw,32px);
    color:var(--blanco-antiguo);
    opacity:0;
    margin:1vh 0;
    transition:opacity 1.8s ease;
  }
  #pantalla-final .texto-final.visible{ opacity:1; }
  #pantalla-final .corazon-final{
    font-size:40px; margin-top:3vh; opacity:0; transition:opacity 1.5s ease;
  }
  #pantalla-final .corazon-final.visible{ opacity:1; animation:latido 1.6s ease-in-out infinite; }

  /* ===================== AUDIO UI ===================== */
  #btn-musica{
    position:fixed; top:max(14px, env(safe-area-inset-top));
    right:16px; z-index:50;
    width:42px; height:42px; border-radius:50%;
    background:rgba(7,7,11,0.55);
    border:1px solid rgba(212,175,55,0.5);
    color:var(--dorado-claro);
    font-size:18px;
    display:none;
    align-items:center; justify-content:center;
    cursor:pointer;
    backdrop-filter:blur(4px);
  }
  #btn-musica.mostrar{ display:flex; }

  @media (max-width:480px){
    .hoja-carta{ padding:5vh 6vw 4vh; }
    .contenedor-botones-pregunta{ height:160px; }
  }
</style>
</head>
<body>
<div id="app">

  <div id="fondo"></div>
  <div id="estrellas"></div>
  <div id="niebla">
    <div class="capa-niebla"></div>
    <div class="capa-niebla b"></div>
  </div>
  <div id="particulas"></div>

  <button id="btn-musica" aria-label="Silenciar musica">🔊</button>

  <!-- PANTALLA 1: SOBRE -->
  <section class="pantalla activa" id="pantalla-sobre">
    <div class="para-quien">Para</div>
    <div class="nombre-destino">Amelia Baldiviezo ❤️</div>
    <div class="escena-sobre" id="escena-sobre">
      <div class="sobre-cuerpo">
        <div class="sobre-lineas"><div></div><div></div></div>
      </div>
      <div class="carta-asomando"></div>
      <div class="sobre-solapa"></div>
      <div class="sello-cera">❤</div>
    </div>
    <div class="instruccion-sobre">Toca el sobre para abrir esta carta.</div>
  </section>

  <!-- PANTALLA 2: CARTA -->
  <section class="pantalla" id="pantalla-carta">
    <div class="hoja-carta" id="hoja-carta">
      <div class="texto-carta" id="texto-carta"></div>
    </div>
  </section>

  <!-- PANTALLA 3: ACTA -->
  <section class="pantalla" id="pantalla-acta">
    <div class="hoja-acta">
      <h2>Acta Oficial de Noviazgo</h2>
      <div class="campo-acta"><b>Nombre</b> Amelia Baldiviezo</div>
      <div class="campo-acta"><b>Solicitante</b> Rafael Felipe Laverde Salamanca</div>
      <div class="campo-acta"><b>Fecha</b> <span id="fecha-acta"></span></div>
      <div class="campo-acta"><b>Estado</b> <span id="estado-acta" class="pendiente">Pendiente</span></div>

      <div class="zona-firma">
        <label>Firma</label>
        <canvas id="lienzo-firma"></canvas>
        <div class="acciones-firma">
          <button class="boton-fantasma" id="btn-limpiar-firma">Borrar</button>
          <button class="boton-dorado" id="btn-continuar-acta" disabled>Continuar</button>
        </div>
      </div>
      <div class="sello-aprobado" id="sello-aprobado">APROBADO</div>
    </div>
  </section>

  <!-- PANTALLA 4: PREGUNTA -->
  <section class="pantalla" id="pantalla-pregunta">
    <div class="pregunta-nombre">Amelia...</div>
    <div class="pregunta-texto">¿Aceptas ser mi novia? ❤️</div>
    <div class="contenedor-botones-pregunta" id="contenedor-botones">
      <button id="btn-si">❤️ Sí, acepto</button>
      <button id="btn-no">🤍 No</button>
    </div>
  </section>

  <!-- PANTALLA 5: CERTIFICADO (reutiliza el acta, ver JS) -->

  <!-- PANTALLA 6: FINAL -->
  <section class="pantalla" id="pantalla-final">
    <div class="texto-final" id="final-1">Ahora solo me queda cumplir la promesa que te hice...</div>
    <div class="texto-final" id="final-2">Ir a verte.</div>
    <div class="corazon-final" id="final-3">❤️</div>
  </section>

  <div id="capa-explosion"></div>

</div>

<script>
(function(){
  "use strict";

  /* =============================================================
     UTILIDADES
  ============================================================= */
  const $ = (sel) => document.querySelector(sel);
  const rand = (min,max) => Math.random()*(max-min)+min;
  const choose = (arr) => arr[Math.floor(Math.random()*arr.length)];

  /* =============================================================
     AUDIO — sintetizado con Web Audio API (sin archivos externos)
  ============================================================= */
  const Audio1 = (() => {
    let ctx = null;
    let masterGain = null;
    let musicGain = null;
    let musicNodes = [];
    let musicPlaying = false;
    let musicInterval = null;
    let muted = false;

    function ensureCtx(){
      if(!ctx){
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = ctx.createGain();
        masterGain.gain.value = 0.9;
        masterGain.connect(ctx.destination);
        musicGain = ctx.createGain();
        musicGain.gain.value = 0.0;
        musicGain.connect(masterGain);
      }
      if(ctx.state === 'suspended') ctx.resume();
      return ctx;
    }

    // Ruido breve filtrado -> sonido de "papel"
    function sonidoPapel(duracion=0.5, tipo='papel'){
      const c = ensureCtx();
      const bufferSize = c.sampleRate * duracion;
      const buffer = c.createBuffer(1, bufferSize, c.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++){
        data[i] = (Math.random()*2-1) * (1 - i/bufferSize);
      }
      const src = c.createBufferSource();
      src.buffer = buffer;
      const filtro = c.createBiquadFilter();
      filtro.type = tipo === 'sello' ? 'bandpass' : 'highpass';
      filtro.frequency.value = tipo === 'sello' ? 1200 : 900;
      filtro.Q.value = tipo === 'sello' ? 2.2 : 0.7;
      const g = c.createGain();
      g.gain.value = 0.35;
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + duracion);
      src.connect(filtro).connect(g).connect(masterGain);
      src.start();
    }

    function tono(freq, tStart, dur, tipo='sine', vol=0.18){
      const c = ensureCtx();
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.type = tipo;
      osc.frequency.value = freq;
      g.gain.value = 0;
      g.gain.setValueAtTime(0, c.currentTime + tStart);
      g.gain.linearRampToValueAtTime(vol, c.currentTime + tStart + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + tStart + dur);
      osc.connect(g).connect(masterGain);
      osc.start(c.currentTime + tStart);
      osc.stop(c.currentTime + tStart + dur + 0.05);
    }

    function chimeApertura(){
      [523.25, 659.25, 783.99].forEach((f,i)=> tono(f, i*0.12, 0.9, 'sine', 0.14));
    }

    function chimeCelebracion(){
      const notas = [523.25,659.25,783.99,987.77,1174.66,1567.98];
      notas.forEach((f,i)=> tono(f, i*0.09, 1.1, 'triangle', 0.16));
      setTimeout(()=> notas.forEach((f,i)=> tono(f*2, i*0.05, 0.6,'sine',0.08)), 500);
    }

    // Pad ambiental suave en loop (musica romantica instrumental)
    function iniciarMusica(){
      if(musicPlaying) return;
      const c = ensureCtx();
      musicPlaying = true;
      musicGain.gain.cancelScheduledValues(c.currentTime);
      musicGain.gain.setValueAtTime(musicGain.gain.value, c.currentTime);
      musicGain.gain.linearRampToValueAtTime(muted?0:0.22, c.currentTime + 2.5);

      const acordes = [
        [261.63, 329.63, 392.00],   // C
        [220.00, 277.18, 329.63],   // Am
        [174.61, 220.00, 261.63],   // F
        [196.00, 246.94, 293.66],   // G
      ];
      let paso = 0;

      function reproducirAcorde(){
        const acorde = acordes[paso % acordes.length];
        paso++;
        acorde.forEach((freq, idx) => {
          const osc = c.createOscillator();
          const g = c.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          const lfo = c.createOscillator();
          const lfoGain = c.createGain();
          lfo.frequency.value = 0.12 + idx*0.03;
          lfoGain.gain.value = 2.2;
          lfo.connect(lfoGain).connect(osc.frequency);
          g.gain.value = 0;
          g.gain.linearRampToValueAtTime(0.09, c.currentTime + 1.6);
          g.gain.linearRampToValueAtTime(0.0, c.currentTime + 7.6);
          osc.connect(g).connect(musicGain);
          osc.start();
          lfo.start();
          osc.stop(c.currentTime + 7.8);
          lfo.stop(c.currentTime + 7.8);
          musicNodes.push(osc, lfo);
        });
      }
      reproducirAcorde();
      musicInterval = setInterval(reproducirAcorde, 6800);
    }

    function ducking(objetivo=0.06, duracionMs=1800){
      if(!musicGain) return;
      const c = ensureCtx();
      const actual = muted ? 0 : 0.22;
      musicGain.gain.cancelScheduledValues(c.currentTime);
      musicGain.gain.setValueAtTime(musicGain.gain.value, c.currentTime);
      musicGain.gain.linearRampToValueAtTime(muted?0:objetivo, c.currentTime + 0.6);
      setTimeout(()=>{
        if(!muted && musicGain){
          musicGain.gain.cancelScheduledValues(ctx.currentTime);
          musicGain.gain.setValueAtTime(musicGain.gain.value, ctx.currentTime);
          musicGain.gain.linearRampToValueAtTime(0.22, ctx.currentTime + 1.2);
        }
      }, duracionMs);
    }

    function alternarSilencio(){
      muted = !muted;
      if(musicGain && ctx){
        musicGain.gain.cancelScheduledValues(ctx.currentTime);
        musicGain.gain.setValueAtTime(musicGain.gain.value, ctx.currentTime);
        musicGain.gain.linearRampToValueAtTime(muted?0:0.22, ctx.currentTime + 0.5);
      }
      return muted;
    }

    return { ensureCtx, sonidoPapel, chimeApertura, chimeCelebracion, iniciarMusica, ducking, alternarSilencio };
  })();

  /* =============================================================
     FONDO: ESTRELLAS + PARTICULAS
  ============================================================= */
  function crearEstrellas(){
    const cont = $('#estrellas');
    const frag = document.createDocumentFragment();
    const cantidad = window.innerWidth < 600 ? 70 : 140;
    for(let i=0;i<cantidad;i++){
      const e = document.createElement('div');
      e.className = 'estrella';
      const tam = rand(1,2.6);
      e.style.width = tam+'px';
      e.style.height = tam+'px';
      e.style.left = rand(0,100)+'vw';
      e.style.top = rand(0,100)+'vh';
      e.style.animationDuration = rand(2,5)+'s';
      e.style.animationDelay = rand(0,4)+'s';
      frag.appendChild(e);
    }
    cont.appendChild(frag);
  }

  const EMOJIS_PARTICULAS = ['❤️','🌹','✨','🦋'];
  function crearParticula(){
    const cont = $('#particulas');
    const p = document.createElement('div');
    p.className = 'particula';
    p.textContent = choose(EMOJIS_PARTICULAS);
    p.style.left = rand(0,100)+'vw';
    p.style.fontSize = rand(14,26)+'px';
    const duracion = rand(9,17);
    p.style.animationDuration = duracion+'s, '+rand(3,6)+'s';
    p.style.opacity = '0';
    cont.appendChild(p);
    setTimeout(()=> p.remove(), duracion*1000 + 200);
  }
  let intervaloParticulas = null;
  function iniciarLluviaParticulas(){
    if(intervaloParticulas) return;
    for(let i=0;i<6;i++) setTimeout(crearParticula, i*300);
    intervaloParticulas = setInterval(crearParticula, 650);
  }

  /* =============================================================
     GESTOR DE PANTALLAS
  ============================================================= */
  function mostrarPantalla(id){
    document.querySelectorAll('.pantalla').forEach(p=>{
      if(p.id === id){
        p.classList.add('activa');
        p.classList.remove('saliendo');
      } else if(p.classList.contains('activa')){
        p.classList.add('saliendo');
        setTimeout(()=>{ p.classList.remove('activa'); p.classList.remove('saliendo'); }, 1100);
      }
    });
  }

  /* =============================================================
     PANTALLA 1 -> SOBRE
  ============================================================= */
  const escenaSobre = $('#escena-sobre');
  let sobreAbierto = false;
  escenaSobre.addEventListener('click', () => {
    if(sobreAbierto) return;
    sobreAbierto = true;
    Audio1.ensureCtx();
    Audio1.sonidoPapel(0.5,'papel');
    setTimeout(()=> Audio1.sonidoPapel(0.35,'sello'), 150);
    escenaSobre.classList.add('abriendo');
    Audio1.iniciarMusica();
    setTimeout(()=> Audio1.chimeApertura(), 700);
    $('#btn-musica').classList.add('mostrar');

    setTimeout(() => {
      mostrarPantalla('pantalla-carta');
      iniciarCarta();
    }, 2400);
  });

  /* =============================================================
     PANTALLA 2 -> CARTA (efecto maquina de escribir)
  ============================================================= */
  const LINEAS_CARTA = [
    "Para Amelia ❤️","",
    "Dicen que la distancia puede separar personas, pero contigo descubrí que también puede unir dos corazones.",
    "No me importa lo lejos que estés.",
    "Desde el momento en que empezamos a hablar de verdad me gustaste.",
    "Nada de lo que estoy diciendo es mentira.","",
    "Quiero ir a verte.",
    "Quiero caminar contigo.",
    "Quiero abrazarte.",
    "Quiero ser tu novio.",
    "Quiero ser tu compañero.","",
    "Mis días cambiaron desde que apareciste.",
    "No puedo imaginar una vida donde nunca te hubiera conocido.",
    "Y aunque aún queda mucho por vivir...","",
    "Hay algo que quiero preguntarte.",
    "Porque mi corazón ya tomó una decisión.",
    "Y quiero que seas tú.","",
    "Hoy.","Mañana.","Y todos los días que vengan.","",
    "Algún día incluso sueño con casarme contigo.",
    "Pero antes...","",
    "Quiero preguntarte algo."
  ];

  let cartaIniciada = false;
  function iniciarCarta(){
    if(cartaIniciada) return;
    cartaIniciada = true;
    const contenedor = $('#texto-carta');
    contenedor.innerHTML = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor-escritura';
    cursor.textContent = '\u00A0';

    let li = 0, ci = 0;
    let bufferHTML = '';

    function escribir(){
      if(li >= LINEAS_CARTA.length){
        cursor.remove();
        setTimeout(finalizarCarta, 2600);
        return;
      }
      const linea = LINEAS_CARTA[li];
      if(ci === 0 && bufferHTML !== '') bufferHTML += '\n';

      if(linea === ''){
        li++; ci = 0;
        contenedor.innerHTML = bufferHTML;
        contenedor.appendChild(cursor);
        setTimeout(escribir, 260);
        return;
      }

      bufferHTML += linea[ci];
      ci++;
      contenedor.innerHTML = bufferHTML;
      contenedor.appendChild(cursor);
      contenedor.scrollTop = contenedor.scrollHeight;

      if(ci >= linea.length){
        li++; ci = 0;
        setTimeout(escribir, rand(180,340));
      } else {
        setTimeout(escribir, rand(28,58));
      }
    }
    setTimeout(escribir, 500);
  }

  function finalizarCarta(){
    const hoja = $('#hoja-carta');
    hoja.style.transition = 'transform 1.2s cubic-bezier(.6,.05,.3,1), opacity 1.2s ease';
    hoja.style.transform = 'scaleY(0.05) translateY(10%)';
    hoja.style.opacity = '0';
    Audio1.ducking(0.10, 1400);
    setTimeout(() => {
      mostrarPantalla('pantalla-acta');
      prepararActa();
    }, 1000);
  }

  /* =============================================================
     PANTALLA 3 -> ACTA + FIRMA
  ============================================================= */
  function prepararActa(){
    const fecha = new Date();
    const opciones = { day:'numeric', month:'long', year:'numeric' };
    $('#fecha-acta').textContent = fecha.toLocaleDateString('es-ES', opciones);
  }

  const lienzo = $('#lienzo-firma');
  const ctxFirma = lienzo.getContext('2d');
  let dibujando = false;
  let firmaHecha = false;

  function ajustarLienzo(){
    const ratio = window.devicePixelRatio || 1;
    const rect = lienzo.getBoundingClientRect();
    lienzo.width = rect.width * ratio;
    lienzo.height = rect.height * ratio;
    ctxFirma.scale(ratio, ratio);
    ctxFirma.lineWidth = 2.4;
    ctxFirma.lineCap = 'round';
    ctxFirma.strokeStyle = '#000000';
ctxFirma.lineWidth = 4;
  }
  window.addEventListener('resize', ajustarLienzo);
  setTimeout(ajustarLienzo, 50);

  function posDesdeEvento(e){
    const rect = lienzo.getBoundingClientRect();
    const punto = e.touches ? e.touches[0] : e;
    return { x: punto.clientX - rect.left, y: punto.clientY - rect.top };
  }
  function empezarTrazo(e){
    e.preventDefault();
    dibujando = true;
    const p = posDesdeEvento(e);
    ctxFirma.beginPath();
    ctxFirma.moveTo(p.x, p.y);
  }
  function trazar(e){
    if(!dibujando) return;
    e.preventDefault();
    const p = posDesdeEvento(e);
    ctxFirma.lineTo(p.x, p.y);
    ctxFirma.stroke();
    if(!firmaHecha){
      firmaHecha = true;
      $('#btn-continuar-acta').disabled = false;
    }
  }
  function terminarTrazo(){ dibujando = false; }

  ['mousedown','touchstart'].forEach(ev => lienzo.addEventListener(ev, empezarTrazo, {passive:false}));
  ['mousemove','touchmove'].forEach(ev => lienzo.addEventListener(ev, trazar, {passive:false}));
  ['mouseup','mouseleave','touchend'].forEach(ev => lienzo.addEventListener(ev, terminarTrazo));

  $('#btn-limpiar-firma').addEventListener('click', () => {
    ctxFirma.clearRect(0,0,lienzo.width,lienzo.height);
    firmaHecha = false;
    $('#btn-continuar-acta').disabled = true;
  });

  $('#btn-continuar-acta').addEventListener('click', () => {
    Audio1.sonidoPapel(0.3,'papel');
    mostrarPantalla('pantalla-pregunta');
  });

  /* =============================================================
     PANTALLA 4 -> PREGUNTA FINAL (boton que huye)
  ============================================================= */
  const btnNo = $('#btn-no');
  const btnSi = $('#btn-si');
  const contenedorBotones = $('#contenedor-botones');
  const FRASES_HUIDA = ['¿Segura?','Uy casi.','Inténtalo otra vez.','Piensa bien.','¿En serio?','Casi, casi...'];
  let intentosHuida = 0;
  const MAX_INTENTOS = 6;
  let huidaActiva = true;

  function moverBotonNo(){
    if(!huidaActiva) return;
    const rect = contenedorBotones.getBoundingClientRect();
    const anchoBtn = btnNo.offsetWidth || 120;
    const altoBtn = btnNo.offsetHeight || 50;
    const maxX = Math.max(rect.width - anchoBtn, 10);
    const maxY = Math.max(rect.height - altoBtn, 10);
    const nuevoX = rand(0, maxX);
    const nuevoY = rand(0, maxY);
    btnNo.style.left = nuevoX + 'px';
    btnNo.style.top = nuevoY + 'px';
    btnNo.style.right = 'auto';
    btnNo.style.transform = 'none';
    btnNo.textContent = '🤍 ' + choose(FRASES_HUIDA);
    intentosHuida++;
    if(intentosHuida >= MAX_INTENTOS){
      huidaActiva = false;
      btnNo.textContent = '🤍 No';
    }
  }

  function cercaDelBoton(x,y){
    const rect = btnNo.getBoundingClientRect();
    const margen = 55;
    return x > rect.left - margen && x < rect.right + margen &&
           y > rect.top - margen && y < rect.bottom + margen;
  }

  document.addEventListener('mousemove', (e) => {
    if(!$('#pantalla-pregunta').classList.contains('activa') || !huidaActiva) return;
    if(cercaDelBoton(e.clientX, e.clientY)) moverBotonNo();
  });
  btnNo.addEventListener('touchstart', (e) => {
    if(huidaActiva){ e.preventDefault(); moverBotonNo(); }
  }, {passive:false});
  btnNo.addEventListener('click', (e) => {
    if(huidaActiva){ e.preventDefault(); moverBotonNo(); }
  });

  btnSi.addEventListener('click', () => {
    Audio1.chimeCelebracion();
    Audio1.ducking(0.05, 4200);
    explosionCelebracion();
    mostrarPantalla('pantalla-acta');
    setTimeout(() => {
      const estado = $('#estado-acta');
      estado.textContent = '❤️ OFICIALMENTE NOVIOS ❤️';
      estado.classList.remove('pendiente');
      estado.classList.add('aprobado');
      $('#lienzo-firma').style.display = 'none';
      document.querySelector('.zona-firma label').style.display='none';
      document.querySelector('.acciones-firma').style.display='none';
      $('#sello-aprobado').classList.add('mostrar');
    }, 200);

    setTimeout(() => {
      mostrarPantalla('pantalla-final');
      secuenciaFinal();
    }, 5200);
  });

  /* =============================================================
     EXPLOSION DE CELEBRACION
  ============================================================= */
  const EMOJIS_EXPLOSION = ['❤️','🌹','✨','🎉','🦋','💛','🎊'];
  function explosionCelebracion(){
    const capa = $('#capa-explosion');
    const total = window.innerWidth < 600 ? 60 : 110;
    for(let i=0;i<total;i++){
      setTimeout(() => {
        const s = document.createElement('div');
        s.className = 'chispa';
        s.textContent = choose(EMOJIS_EXPLOSION);
        const cx = window.innerWidth/2, cy = window.innerHeight/2;
        s.style.left = cx + 'px';
        s.style.top = cy + 'px';
        s.style.fontSize = rand(16,30)+'px';
        const angulo = rand(0, Math.PI*2);
        const distancia = rand(120, Math.max(window.innerWidth,window.innerHeight)*0.6);
        const dx = Math.cos(angulo)*distancia;
        const dy = Math.sin(angulo)*distancia;
        s.style.setProperty('--destino', `translate(${dx}px, ${dy}px)`);
        s.style.setProperty('--giro', rand(-360,360)+'deg');
        capa.appendChild(s);
        setTimeout(()=> s.remove(), 1700);
      }, i*12);
    }
  }

  /* =============================================================
     PANTALLA FINAL
  ============================================================= */
  function secuenciaFinal(){
    setTimeout(()=> $('#final-1').classList.add('visible'), 600);
    setTimeout(()=> $('#final-2').classList.add('visible'), 3400);
    setTimeout(()=> $('#final-3').classList.add('visible'), 5200);
  }

  /* =============================================================
     CONTROL DE MUSICA
  ============================================================= */
  $('#btn-musica').addEventListener('click', function(){
    const silenciado = Audio1.alternarSilencio();
    this.textContent = silenciado ? '🔇' : '🔊';
  });

  /* =============================================================
     INICIO
  ============================================================= */
  crearEstrellas();
  iniciarLluviaParticulas();

})();
</script>
</body>
